<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoScope - Digital Habits Quiz</title>
  <link rel="stylesheet" href="../css/styles.css">

</head>

<body>
  <div class="container" id="quizContainer">
    <div class="home-content">
      <h2>Daily Habits Quiz 🎀</h2>
      <p class="subtitle">Let's see how mindful you were today!</p>
    </div>

    <form id="quizForm" class="form-card">
      <div class="input-group">
        <label>1. How many hours did you spend on your phone today? 📱</label>
        <label class="quiz-option"><input type="radio" name="q1" value="3" required> Less than 1 hour</label>
        <label class="quiz-option"><input type="radio" name="q1" value="2"> 1 to 3 hours</label>
        <label class="quiz-option"><input type="radio" name="q1" value="1"> Too many to count!</label>
      </div>

      <div class="input-group">
        <label>2. Did you scroll right before sleeping last night? 🌙</label>
        <label class="quiz-option"><input type="radio" name="q2" value="3" required> No, I slept well</label>
        <label class="quiz-option"><input type="radio" name="q2" value="2"> Just a little bit</label>
        <label class="quiz-option"><input type="radio" name="q2" value="1"> Yes, guilty!</label>
      </div>

      <div class="input-group">
        <label>3. How often did you get distracted while studying? 📚</label>
        <label class="quiz-option"><input type="radio" name="q3" value="3" required> Never</label>
        <label class="quiz-option"><input type="radio" name="q3" value="2"> Sometimes</label>
        <label class="quiz-option"><input type="radio" name="q3" value="1"> Very Often</label>
      </div>

      <div class="input-group">
        <label>4. Did you take breaks? 🍵</label>
        <label class="quiz-option"><input type="radio" name="q4" value="3" required> Yes, feeling fresh!</label>
        <label class="quiz-option"><input type="radio" name="q4" value="1"> Forgot to take breaks</label>
      </div>

      <button type="submit" class="btn full-width">See My Result ✨</button>
    </form>
  </div>

  <!-- Hidden Result Dashboard -->
  <div class="container" id="resultDashboard">
    <div class="home-content">
      <h2>Your Daily Result 🌸</h2>
      <p class="subtitle" id="resultMessage">Calculating...</p>
    </div>

    <div class="dashboard-grid">
      <div class="stat-card full-span">
        <div class="label">Focus Score</div>
        <div class="value gradient-text" id="focusScoreVal">0/12</div>
      </div>
      <div class="stat-card">
        <div class="label">Status</div>
        <div class="value" id="statusVal" style="font-size: 1.5rem;">Good</div>
      </div>
      <div class="stat-card">
        <div class="label">Screen Time</div>
        <div class="value" id="screenTimeVal" style="font-size: 1.5rem;">Low</div>
      </div>
    </div>

    <button id="retakeBtn" class="btn outline full-width" style="margin-top: 20px;">Retake Quiz 🔄</button>
  </div>

  <nav class="floating-nav">
    <a href="../index.html">Home</a>
    <a href="about.html">About</a>
    <a href="login.html" id="loginLink">Login</a>
  </nav>

  <script src="../js/analysis.js"></script>
</body>

</html>
