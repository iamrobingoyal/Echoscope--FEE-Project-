<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoScope - Timer</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div class="container">
    <!-- Old nav removed -->

    <div class="task-header" style="justify-content: center; border: none;">
      <h2 style="margin-bottom: 0;">Focus Timer</h2>
    </div>

    <div class="timer-circle">
      <div class="timing-value" id="timeDisplay">25:00</div>
      <div class="timing-label" id="sessionLabel">Session 1</div>
    </div>

    <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
      <button class="btn" id="startBtn">Start Focus</button>
      <button class="btn outline" id="resetBtn">Reset</button>
    </div>

  </div>

  <nav class="floating-nav">
    <a href="../index.html">Home</a>
    <a href="about.html">About</a>
    <a href="login.html" id="loginLink">Login</a>
  </nav>

  <script src="../js/timer.js"></script>
  <script>
    // Navigation logic
    const currentUser = localStorage.getItem('echoscope_user');
    if (currentUser) {
      document.getElementById('loginLink').textContent = 'Profile';
    }
  </script>
</body>

</html>
