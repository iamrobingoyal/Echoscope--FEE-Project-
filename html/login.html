<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoScope - Login</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <div class="container">
    <div class="home-content">
      <h2>Welcome Back! 🌸</h2>
      <p class="subtitle">Log in to save your doodles and progress.</p>
    </div>

    <form id="loginForm" class="form-card">
      <div class="input-group">
        <label for="username">Username ✨</label>
        <input type="text" id="username" class="input-field" placeholder="Enter your cute name" required>
      </div>
      <div class="input-group">
        <label for="password">Password 🎀</label>
        <input type="password" id="password" class="input-field" placeholder="Secret password" required>
      </div>
      <button type="submit" class="btn full-width">Login</button>
    </form>
  </div>

  <nav class="floating-nav">
    <a href="../index.html">Home</a>
    <a href="about.html">About</a>
    <a href="login.html" class="active">Login</a>
  </nav>

  <script src="../js/login.js"></script>
</body>

</html>
